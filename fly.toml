# fly.toml app configuration file generated for welcome-vsrp-bot on 2026-04-15T17:40:16-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'welcome-vsrp-bot'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
[processes]
app = "node index.js"